name: Build Toca Mobile APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake zip unzip openjdk-17-jdk
      - run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
      - name: Build APK
        working-directory: ./mobile
        run: buildozer android debug 2>&1 | tail -100
        timeout-minutes: 120
      - uses: actions/upload-artifact@v4
        with:
          name: toca-mobile-apk
          path: mobile/bin/*.apk
          if-no-files-found: warn
