name: Build Toca Mobile APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential git python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev automake zip unzip openjdk-17-jdk
      - name: Install Buildozer
        run: pip install --upgrade pip && pip install buildozer cython==0.29.33
      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "Buildozer exit code: ${PIPESTATUS[0]}"
          exit ${PIPESTATUS[0]}
        timeout-minutes: 120
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: toca-mobile-apk
          path: bin/*.apk
          if-no-files-found: warn
